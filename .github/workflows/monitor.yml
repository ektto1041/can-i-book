name: Monitor hotel room

on:
  schedule:
    - cron: "0-59/5 * * * *"
    - cron: "1-59/5 * * * *"
    - cron: "2-59/5 * * * *"
    - cron: "3-59/5 * * * *"
    - cron: "4-59/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor once
        env:
          TARGET_URL: ${{ vars.TARGET_URL || 'https://hub.hotelstory.com/MTAwMDMwMw/calendar?v_caldate=2026-10' }}
          TARGET_DATE: ${{ vars.TARGET_DATE || '2026-10-03' }}
          HTTP_TIMEOUT_SECONDS: ${{ vars.HTTP_TIMEOUT_SECONDS || '10' }}
          SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '465' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python monitor.py --once
